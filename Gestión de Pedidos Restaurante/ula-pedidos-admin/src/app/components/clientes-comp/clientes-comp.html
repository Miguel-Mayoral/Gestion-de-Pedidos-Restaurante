<div class="container my-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Directorio de Clientes 👥</h2>
    <div class="d-flex gap-2">
      <input type="number" class="form-control form-control-sm" placeholder="Buscar por ID..." [(ngModel)]="busquedaId">
      <button class="btn btn-sm btn-dark" (click)="buscarPorId()">Buscar</button>
    </div>
  </div>

  <div class="card shadow-sm border-0 p-3">
    <table class="table table-striped align-middle">
      <thead>
      <tr>
        <th>ID</th>
        <th>Nombre Completo</th>
        <th>Teléfono</th>
        <th>Correo Electrónico</th>
        <th>Fecha Registro</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let item of clientes">
        <td>#{{ item.idCliente }}</td>
        <td>{{ item.nombre }} {{ item.apellido }}</td>
        <td>{{ item.telefono }}</td>
        <td><mark>{{ item.correo }}</mark></td>
        <td>{{ item.fechaRegistro | date:'shortDate' }}</td>
        <td>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editClienteModal" (click)="activarEdicion(item)">
              ⚙️ Editar
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="eliminarCliente(item.idCliente)">
              🗑️ Eliminar
            </button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="editClienteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content" *ngIf="clienteSeleccionado">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Modificar Comensal #{{ clienteSeleccionado.idCliente }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="clienteSeleccionado.nombre">
        </div>
        <div class="mb-3">
          <label class="form-label">Apellido</label>
          <input type="text" class="form-control" [(ngModel)]="clienteSeleccionado.apellido">
        </div>
        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="text" class="form-control" [(ngModel)]="clienteSeleccionado.telefono">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-primary" data-bs-modal="modal" (click)="guardarCambios()">Guardar</button>
      </div>
    </div>
  </div>
</div>
