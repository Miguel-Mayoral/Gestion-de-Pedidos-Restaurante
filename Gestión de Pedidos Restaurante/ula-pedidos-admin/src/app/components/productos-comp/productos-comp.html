<div class="container my-5">
  <h2 class="fw-bold mb-4">Administración de Productos 🍤</h2>
  <div class="row">
    <div class="col-md-4 mb-4">
      <div class="card p-3 shadow-sm">
        <h5 class="fw-bold">{{ editando ? 'Editar' : 'Nuevo' }} Platillo</h5>
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Nombre del Platillo</label>
            <input type="text" class="form-control" [(ngModel)]="productoForm.nombre" name="nombre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select class="form-select" [(ngModel)]="productoForm.categoria.idCategoria" name="idCategoria" required>
              <option [ngValue]="null" disabled>Selecciona una categoría</option>
              <option *ngFor="let cat of categorias" [value]="cat.idCategoria">{{ cat.nombre }}</option>
            </select>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Precio ($)</label>
              <input type="number" class="form-control" [(ngModel)]="productoForm.precio" name="precio" required>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Stock Inicial</label>
              <input type="number" class="form-control" [(ngModel)]="productoForm.stock" name="stock" [disabled]="editando" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">URL Imagen (Muestra)</label>
            <input type="text" class="form-control" [(ngModel)]="productoForm.urlImagen" name="urlImagen">
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción / Ingredientes</label>
            <textarea class="form-control" [(ngModel)]="productoForm.descripcion" name="descripcion" rows="2"></textarea>
          </div>
          <button type="submit" class="btn btn-success w-100 mb-2">{{ editando ? 'Modificar' : 'Guardar' }}</button>
          <button type="button" class="btn btn-secondary w-100" (click)="limpiarForm()" *ngIf="editando">Cancelar</button>
        </form>
      </div>
    </div>
    <div class="col-md-8">
      <div class="table-responsive shadow-sm bg-white p-3 rounded">
        <table class="table table-hover align-middle">
          <thead>
          <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let prod of productos">
            <td><img [src]="prod.urlImagen || 'assets/default-mariscos.jpg'" width="50" height="50" class="rounded" style="object-fit: cover;"></td>
            <td><strong>{{ prod.nombre }}</strong></td>
            <td><span class="badge bg-light text-dark">{{ prod.categoria?.nombre || 'Ninguna' }}</span></td>
            <td class="text-success fw-bold">${{ prod.precio }}</td>
            <td>
              <span class="badge" [ngClass]="prod.stock > 5 ? 'bg-primary':'bg-danger'">{{ prod.stock }} u.</span>
              <button class="btn btn-sm btn-link p-0 ms-2" (click)="cambiarStock(prod.idProducto, prod.stock)">🔄</button>
            </td>
            <td>
              <button class="btn btn-sm btn-info me-1" (click)="seleccionarEditar(prod)">✏️</button>
              <button class="btn btn-sm btn-danger" (click)="eliminar(prod.idProducto)">🗑️</button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
